<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #1f2a44;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            max-width: 850px;
            margin: 25px auto;
            padding: 15px;
        }

        .card {
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        h3 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background: #2e86de;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #1b6fc2;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #ecf0f1;
        }

        .empty {
            text-align: center;
            color: gray;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    📊 Grades Tracker
</header>

<div class="container">

    <!-- Add Grade -->
    <div class="card">
        <h3>Add New Grade</h3>

        <form method="POST">
            <input type="text" name="subject" placeholder="Subject" required>
            <input type="number" name="score" placeholder="Score" required>
            <button type="submit">Save Grade</button>
        </form>
    </div>

    <!-- Grades List -->
    <div class="card">
        <h3>All Grades</h3>

        {% if grades and grades|length > 0 %}
        <table>
            <tr>
                <th>Subject</th>
                <th>Score</th>
            </tr>

            {% for grade in grades %}
            <tr>
                <td>{{ grade.subject }}</td>
                <td>{{ grade.score }}</td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <div class="empty">No grades added yet.</div>
        {% endif %}

    </div>

</div>

</body>
</html>
